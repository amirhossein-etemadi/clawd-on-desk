<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <!--
    Cosmetic accessory variant of clawd-idle-follow.svg for the built-in
    "Clawd" theme: identical pixel-crab pose, with a small pixel-art party
    hat above the torso. Unlocked at companion level 3 (see
    ACCESSORY_UNLOCKS in scripts/companion-watcher.js), equipped via
    Settings > Companion, which points theme.states.idle[0] at a file named
    exactly "idle-accessory-partyhat.svg" in the active theme's own assets
    folder (see applyCompanionAccessory in src/main.js), same filename
    convention reused across every theme so no per-theme code is needed.
  -->
  <defs>
    <style>
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 4s infinite ease-in-out;
      }

      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes eye-blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5% { transform: scaleY(0.1); }
      }
    </style>
  </defs>

  <!-- Ground Shadow (JS-controlled horizontal shift) -->
  <g id="shadow-js">
    <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  </g>

  <!-- Static Legs (slightly taller for upward body shift) -->
  <g id="legs" fill="#DE886D">
    <rect x="3" y="11" width="1" height="4"/>
    <rect x="5" y="11" width="1" height="4"/>
    <rect x="9" y="11" width="1" height="4"/>
    <rect x="11" y="11" width="1" height="4"/>
  </g>

  <!-- Upper Body (JS body-shift + CSS breathe) -->
  <g id="body-js">
    <g class="breathe-anim">
      <!-- Party hat: pixel-art cone perched right above the torso -->
      <g id="accessory-hat">
        <rect x="5" y="5" width="5" height="1" fill="#6f57b8"/>
        <rect x="6" y="3" width="3" height="2" fill="#8a6fd8"/>
        <rect x="6" y="4" width="3" height="1" fill="#f6bfcb"/>
        <rect x="7" y="1" width="1" height="2" fill="#8a6fd8"/>
        <rect x="7" y="0" width="1" height="1" fill="#f6bfcb"/>
      </g>
      <!-- Torso -->
      <rect id="torso" x="2" y="6" width="11" height="7" fill="#DE886D"/>
      <!-- Left Arm -->
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
      <!-- Right Arm -->
      <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      <!-- Eyes: JS translate wrapper + CSS blink -->
      <g id="eyes-js" fill="#000000">
        <g class="eyes-blink">
          <rect x="4" y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>
      </g>
    </g>
  </g>
</svg>
