<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .swing { animation: swing 0.6s ease-in-out infinite; transform-origin: 7.5px 3px; }
    @keyframes swing { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    .dangle-l { animation: dangle 0.6s ease-in-out infinite; transform-origin: 1.5px 9px; }
    .dangle-r { animation: dangle 0.6s ease-in-out infinite .3s; transform-origin: 13.5px 9px; }
    @keyframes dangle { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="6" ry="1.2" fill="rgba(0,0,0,0.1)"/>

  <g class="swing">
    <rect x="0" y="3" width="15" height="14" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="11.5" rx="4.2" ry="4.6" fill="#fbeed2" opacity="0.7"/>

    <path class="dangle-l" d="M 1.5 9 Q -1.5 12 -1 16.4" stroke="#f3d9a8" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <circle class="dangle-l" cx="-1" cy="16.6" r="1.4" fill="#f3d9a8"/>
    <path class="dangle-r" d="M 13.5 9 Q 16.5 12 16 16.4" stroke="#f3d9a8" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <circle class="dangle-r" cx="16" cy="16.6" r="1.4" fill="#f3d9a8"/>

    <polygon points="1,-3.6 3,-9.6 5.6,-4.4" fill="#f3d9a8"/>
    <polygon points="14,-3.6 12,-9.6 9.4,-4.4" fill="#f3d9a8"/>
    <polygon points="2,-4.6 3.2,-8.2 4.6,-5" fill="#f6bfcb"/>
    <polygon points="13,-4.6 11.8,-8.2 10.4,-5" fill="#f6bfcb"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.6" rx="1.4" ry="1" fill="#f0a8a8" opacity="0.8"/>
    <ellipse cx="11.7" cy="0.6" rx="1.4" ry="1" fill="#f0a8a8" opacity="0.8"/>

    <circle cx="4.9" cy="-1.4" r="2.5" fill="#fff" stroke="#3a2a1e" stroke-width="0.3"/>
    <circle cx="10.1" cy="-1.4" r="2.5" fill="#fff" stroke="#3a2a1e" stroke-width="0.3"/>
    <circle cx="4.9" cy="-1.4" r="1.2" fill="#3a2a1e"/>
    <circle cx="10.1" cy="-1.4" r="1.2" fill="#3a2a1e"/>
    <ellipse cx="7.5" cy="2" rx="1" ry="1.1" fill="#7a4a3a"/>
  </g>
</svg>
