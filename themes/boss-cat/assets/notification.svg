<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .ring { animation: ringpulse 1s ease-out infinite; transform-origin: 13px -13px; }
    @keyframes ringpulse { 0% { transform: scale(0.4); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
    .exclaim { animation: bob2 0.8s ease-in-out infinite; transform-origin: 13px -13px; }
    @keyframes bob2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.2px); } }
    .paw { animation: wave 0.6s ease-in-out infinite; transform-origin: 1.5px 11px; }
    @keyframes wave { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(16deg); } }
    .tilt { animation: alerttilt 1.6s ease-in-out infinite; transform-origin: 7.5px 17px; }
    @keyframes alerttilt { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-2deg); } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="8.5" ry="1.8" fill="rgba(0,0,0,0.15)"/>

  <g class="tilt">
    <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>

    <path class="paw" d="M 1.5 11 Q -2 9.5 -1.6 5.4" stroke="#f3d9a8" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <circle class="paw" cx="-1.7" cy="5.1" r="1.5" fill="#f3d9a8"/>

    <polygon points="1,-4.4 3,-10.6 5.8,-5.2" fill="#f3d9a8"/>
    <polygon points="14,-4.4 12,-10.6 9.2,-5.2" fill="#f3d9a8"/>
    <polygon points="2,-5.6 3.2,-9.4 4.7,-5.9" fill="#f6bfcb"/>
    <polygon points="13,-5.6 11.8,-9.4 10.3,-5.9" fill="#f6bfcb"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>
    <ellipse cx="11.7" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>

    <circle cx="4.9" cy="-1.4" r="2.1" fill="#3a2a1e"/>
    <circle cx="10.1" cy="-1.4" r="2.1" fill="#3a2a1e"/>
    <circle cx="4.3" cy="-2.1" r="0.55" fill="#fff"/>
    <circle cx="10.7" cy="-2.1" r="0.55" fill="#fff"/>
    <ellipse cx="7.5" cy="2" rx="1" ry="0.8" fill="#7a4a3a"/>
  </g>

  <circle class="ring" cx="13" cy="-13" r="3" fill="none" stroke="#e05a5a" stroke-width="1"/>
  <g class="exclaim">
    <rect x="12.3" y="-19" width="1.4" height="4.4" rx="0.7" fill="#e05a5a"/>
    <circle cx="13" cy="-12.6" r="0.9" fill="#e05a5a"/>
  </g>
</svg>
