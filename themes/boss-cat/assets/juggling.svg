<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .groove { animation: groove 1.1s cubic-bezier(.45,0,.55,1) infinite; transform-origin: 7.5px 17px; }
    @keyframes groove { 0%,100% { transform: rotate(-3deg) translateY(0); } 50% { transform: rotate(3deg) translateY(-1px); } }
    .note1{ animation: notefloat 2.4s ease-in infinite; } .note2{ animation: notefloat 2.4s ease-in infinite 1.2s; }
    @keyframes notefloat { 0% { transform: translate(0,0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translate(5px,-10px); opacity: 0; } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="8.5" ry="1.8" fill="rgba(0,0,0,0.15)"/>

  <g class="groove">
    <path d="M 14.8 14 Q 20 11 18 6" stroke="#f3d9a8" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>

    <polygon points="1,-3.6 3,-9.6 5.6,-4.4" fill="#f3d9a8"/>
    <polygon points="14,-3.6 12,-9.6 9.4,-4.4" fill="#f3d9a8"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>
    <ellipse cx="11.7" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>

    <path d="M 0.4 -4.6 Q 7.5 -15.4 14.6 -4.6" stroke="#2a2f38" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <ellipse cx="0.4" cy="-3" rx="2.1" ry="2.7" fill="#2a2f38"/>
    <ellipse cx="14.6" cy="-3" rx="2.1" ry="2.7" fill="#2a2f38"/>
    <ellipse cx="0.4" cy="-3" rx="1.1" ry="1.6" fill="#e05a5a"/>
    <ellipse cx="14.6" cy="-3" rx="1.1" ry="1.6" fill="#e05a5a"/>

    <path d="M 3.9 -1.6 Q 4.9 -0.5 5.9 -1.6" stroke="#3a2a1e" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <path d="M 9.1 -1.6 Q 10.1 -0.5 11.1 -1.6" stroke="#3a2a1e" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <path d="M 6.3 2.3 Q 7.5 3.2 8.7 2.3" stroke="#7a4a3a" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  </g>

  <g class="note1"><text x="17" y="-10" font-family="Georgia, serif" font-size="4" fill="#e05a5a">&#9835;</text></g>
  <g class="note2"><text x="-6" y="-6" font-family="Georgia, serif" font-size="3.4" fill="#e05a5a">&#9835;</text></g>
</svg>
