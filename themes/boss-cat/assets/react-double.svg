<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .flail { animation: flail 0.3s ease-in-out infinite; transform-origin: 7.5px 17px; }
    @keyframes flail { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
    .arm-l { animation: flailarm .3s ease-in-out infinite; transform-origin: 1.5px 10px; }
    .arm-r { animation: flailarm .3s ease-in-out infinite .15s; transform-origin: 13.5px 10px; }
    @keyframes flailarm { 0%,100% { transform: rotate(-20deg); } 50% { transform: rotate(20deg); } }
    .spiral { animation: spiralspin 0.8s linear infinite; transform-origin: 4.9px -1.4px; }
    .spiral2 { animation: spiralspin 0.8s linear infinite reverse; transform-origin: 10.1px -1.4px; }
    @keyframes spiralspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="8.5" ry="1.8" fill="rgba(0,0,0,0.15)"/>

  <g class="flail">
    <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>

    <path class="arm-l" d="M 1.5 10 Q -3 8 -2.6 3" stroke="#f3d9a8" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <circle class="arm-l" cx="-2.7" cy="2.7" r="1.4" fill="#f3d9a8"/>
    <path class="arm-r" d="M 13.5 10 Q 18 8 17.6 3" stroke="#f3d9a8" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <circle class="arm-r" cx="17.7" cy="2.7" r="1.4" fill="#f3d9a8"/>

    <polygon points="1,-3.6 3,-9.6 5.6,-4.4" fill="#f3d9a8"/>
    <polygon points="14,-3.6 12,-9.6 9.4,-4.4" fill="#f3d9a8"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.8" rx="1.5" ry="1" fill="#f0a8a8" opacity="0.85"/>
    <ellipse cx="11.7" cy="0.8" rx="1.5" ry="1" fill="#f0a8a8" opacity="0.85"/>

    <g class="spiral"><path d="M 3.4 -2.6 A 1.6 1.6 0 1 1 6.4 -1" stroke="#3a2a1e" stroke-width="0.7" fill="none" stroke-linecap="round"/></g>
    <g class="spiral2"><path d="M 8.6 -2.6 A 1.6 1.6 0 1 0 11.6 -1" stroke="#3a2a1e" stroke-width="0.7" fill="none" stroke-linecap="round"/></g>
    <ellipse cx="7.5" cy="2.4" rx="1.2" ry="1.3" fill="#7a4a3a"/>
  </g>
</svg>
