<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .lean { animation: lean 1.6s cubic-bezier(.45,0,.55,1) infinite; transform-origin: 7.5px 14px; }
    @keyframes lean { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-1px) rotate(1deg); } }
    .thumb-l { animation: thumbwiggle 0.35s ease-in-out infinite; transform-origin: 4.5px 14.4px; }
    .thumb-r { animation: thumbwiggle 0.35s ease-in-out infinite .15s; transform-origin: 10.5px 14.4px; }
    @keyframes thumbwiggle { 0%,100% { transform: translate(0,0); } 50% { transform: translate(0.5px,-0.6px); } }
    .glow { animation: glow 1s ease-in-out infinite; }
    @keyframes glow { 0%,100% { opacity: 0.5; } 50% { opacity: 0.95; } }
    .focus-blink { animation: focusblink 5s ease-in-out infinite; }
    @keyframes focusblink { 0%,94%,100% { opacity: 0; } 97% { opacity: 1; } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="8.5" ry="1.8" fill="rgba(0,0,0,0.15)"/>
  <rect class="glow" x="-4" y="-8" width="15" height="9" rx="1.5" fill="#8fd3ff" opacity="0.55"/>

  <g class="lean">
    <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>

    <rect x="1" y="12.4" width="13" height="4.2" rx="2.1" fill="#3a3f4c" stroke="#23262f" stroke-width="0.4"/>
    <circle cx="4.5" cy="14.4" r="1.4" fill="#23262f"/>
    <circle class="thumb-l" cx="4.5" cy="14.4" r="0.75" fill="#5b6472"/>
    <circle cx="10.5" cy="14.4" r="1.4" fill="#23262f"/>
    <circle class="thumb-r" cx="10.5" cy="14.4" r="0.75" fill="#5b6472"/>
    <circle cx="7.5" cy="13.3" r="0.5" fill="#e05a5a"/>

    <polygon points="1,-3.6 3,-9.6 5.6,-4.4" fill="#f3d9a8"/>
    <polygon points="14,-3.6 12,-9.6 9.4,-4.4" fill="#f3d9a8"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>
    <ellipse cx="11.7" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>

    <ellipse cx="4.9" cy="-1.3" rx="2" ry="2.3" fill="#3a2a1e"/>
    <ellipse cx="10.1" cy="-1.3" rx="2" ry="2.3" fill="#3a2a1e"/>
    <ellipse cx="4.9" cy="-1.3" rx="2" ry="2.3" fill="#8fd3ff" opacity="0.35"/>
    <ellipse cx="10.1" cy="-1.3" rx="2" ry="2.3" fill="#8fd3ff" opacity="0.35"/>
    <circle cx="4.3" cy="-2" r="0.5" fill="#fff"/>
    <circle cx="10.7" cy="-2" r="0.5" fill="#fff"/>
    <rect class="focus-blink" x="2.5" y="-3.5" width="4.6" height="2.6" fill="#f3d9a8"/>
    <rect class="focus-blink" x="7.7" y="-3.5" width="4.6" height="2.6" fill="#f3d9a8"/>

    <ellipse cx="7.5" cy="2" rx="0.9" ry="0.6" fill="#7a4a3a"/>
  </g>
</svg>
