<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) infinite; transform-origin: 7.5px 17px; }
    @keyframes shake { 0%,100% { transform: translateX(0) rotate(0deg); } 25% { transform: translateX(-0.7px) rotate(-1.5deg); } 75% { transform: translateX(0.7px) rotate(1.5deg); } }
    .sweat { animation: sweat 1.1s ease-in infinite; }
    @keyframes sweat { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(3px); opacity: 0; } }
    .zigzag { animation: zigzagpulse 0.7s ease-in-out infinite; transform-origin: 12px -12px; }
    @keyframes zigzagpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.25); } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="8.5" ry="1.8" fill="rgba(0,0,0,0.15)"/>

  <g class="shake">
    <path d="M 14.8 14 Q 20 11 18 6" stroke="#f3d9a8" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>

    <polygon points="1,-4.4 3.2,-10.6 6,-5.2" fill="#f3d9a8"/>
    <polygon points="14,-4.4 11.8,-10.6 9,-5.2" fill="#f3d9a8"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.4" rx="1.5" ry="1" fill="#f0a8a8" opacity="0.8"/>
    <ellipse cx="11.7" cy="0.4" rx="1.5" ry="1" fill="#f0a8a8" opacity="0.8"/>

    <circle cx="4.9" cy="-1.2" r="2.5" fill="#fff" stroke="#3a2a1e" stroke-width="0.3"/>
    <circle cx="10.1" cy="-1.2" r="2.5" fill="#fff" stroke="#3a2a1e" stroke-width="0.3"/>
    <circle cx="4.9" cy="-1.2" r="1.2" fill="#3a2a1e"/>
    <circle cx="10.1" cy="-1.2" r="1.2" fill="#3a2a1e"/>
    <ellipse cx="7.5" cy="2.2" rx="1.1" ry="0.9" fill="#7a4a3a"/>
    <path class="sweat" d="M 12.6 -8 Q 14 -6 12.6 -5 Q 11.2 -6 12.6 -8 Z" fill="#8fd3ff"/>
  </g>

  <g class="zigzag">
    <path d="M 10 -14 L 13 -12.6 L 11 -11.4 L 14 -10" stroke="#e05a5a" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
