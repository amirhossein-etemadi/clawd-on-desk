<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .bob { animation: bob 0.9s cubic-bezier(.45,0,.55,1) infinite; transform-origin: 7.5px 17px; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-0.6px); } }
    .paw-l { animation: type-l 0.45s ease-in-out infinite; transform-origin: 4px 12px; }
    .paw-r { animation: type-r 0.45s ease-in-out infinite .22s; transform-origin: 11px 12px; }
    @keyframes type-l { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.1px); } }
    @keyframes type-r { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.1px); } }
    .blink-fast { animation: blinkfast 2.4s ease-in-out infinite; }
    @keyframes blinkfast { 0%,88%,100% { opacity: 0; } 92%,96% { opacity: 1; } }
    .glow { animation: glow 1.6s ease-in-out infinite; }
    @keyframes glow { 0%,100% { opacity: 0.5; } 50% { opacity: 0.9; } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="8.5" ry="1.8" fill="rgba(0,0,0,0.15)"/>

  <g class="bob">
    <path d="M 5 9.6 L 5 5.4 L 10 5.4 L 10 9.6 Z" fill="#7a8a99"/>
    <rect class="glow" x="5.7" y="6" width="2.6" height="2.9" fill="#8fd3ff" opacity="0.7"/>
    <rect x="3.5" y="9.4" width="8" height="1.6" rx="0.5" fill="#5b6472"/>

    <path d="M 14.8 14 Q 20 11 18 6" stroke="#f3d9a8" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>

    <path class="paw-l" d="M 2.5 13 Q 2.4 15.4 3.6 16.8" stroke="#f3d9a8" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path class="paw-r" d="M 12.5 13 Q 12.6 15.4 11.4 16.8" stroke="#f3d9a8" stroke-width="2.6" fill="none" stroke-linecap="round"/>

    <polygon points="1,-3.6 3,-9.6 5.6,-4.4" fill="#f3d9a8"/>
    <polygon points="14,-3.6 12,-9.6 9.4,-4.4" fill="#f3d9a8"/>
    <polygon points="2,-4.6 3.2,-8.2 4.6,-5" fill="#f6bfcb"/>
    <polygon points="13,-4.6 11.8,-8.2 10.4,-5" fill="#f6bfcb"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>
    <ellipse cx="11.7" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>

    <circle cx="4.9" cy="-1.2" r="2.1" fill="#3a2a1e"/>
    <circle cx="10.1" cy="-1.2" r="2.1" fill="#3a2a1e"/>
    <circle cx="4.3" cy="-1.9" r="0.55" fill="#fff"/>
    <circle cx="10.7" cy="-1.9" r="0.55" fill="#fff"/>
    <rect class="blink-fast" x="2.6" y="-3.3" width="4.6" height="2.8" fill="#f3d9a8"/>
    <rect class="blink-fast" x="7.8" y="-3.3" width="4.6" height="2.8" fill="#f3d9a8"/>
    <path d="M 6.3 1.9 Q 7.5 2.6 8.7 1.9" stroke="#7a4a3a" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
