<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .breathe-slow { animation: breatheslow 3.6s cubic-bezier(.45,0,.55,1) infinite; transform-origin: 7.5px 14px; }
    @keyframes breatheslow { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.03); } }
    .z1{ animation: zfloat 3s ease-in infinite; } .z2{ animation: zfloat 3s ease-in infinite 1s; } .z3{ animation: zfloat 3s ease-in infinite 2s; }
    @keyframes zfloat { 0% { transform: translate(0,0) scale(0.6); opacity: 0; } 15% { opacity: 1; } 100% { transform: translate(4px,-9px) scale(1.1); opacity: 0; } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="9.5" ry="2" fill="rgba(0,0,0,0.15)"/>

  <g class="breathe-slow">
    <ellipse cx="7.5" cy="12.5" rx="10" ry="6.5" fill="#f3d9a8"/>
    <ellipse cx="6" cy="9" rx="7" ry="6" fill="#f3d9a8" transform="rotate(-10 6 9)"/>

    <polygon points="0.5,6 2.2,1.4 4.6,5.6" fill="#f3d9a8" transform="rotate(-10 6 9)"/>
    <polygon points="11.5,6.6 12.4,1.6 8.6,5" fill="#f3d9a8" transform="rotate(-10 6 9)"/>

    <path d="M 2.4 8.4 Q 3.6 9.4 4.8 8.4" stroke="#3a2a1e" stroke-width="0.6" fill="none" stroke-linecap="round" transform="rotate(-10 6 9)"/>
    <path d="M 7.6 7.6 Q 8.8 8.6 10 7.6" stroke="#3a2a1e" stroke-width="0.6" fill="none" stroke-linecap="round" transform="rotate(-10 6 9)"/>
    <ellipse cx="6" cy="10.6" rx="0.8" ry="0.6" fill="#e88a9a" transform="rotate(-10 6 9)"/>

    <path d="M 15 15 Q 21 16 19 10" stroke="#f3d9a8" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>

  <g class="z1"><text x="14" y="0" font-family="Georgia, serif" font-size="4.4" fill="#8fa0b3">Z</text></g>
  <g class="z2"><text x="16.5" y="-4" font-family="Georgia, serif" font-size="3.6" fill="#8fa0b3">Z</text></g>
  <g class="z3"><text x="19" y="-8" font-family="Georgia, serif" font-size="2.8" fill="#8fa0b3">Z</text></g>
</svg>
