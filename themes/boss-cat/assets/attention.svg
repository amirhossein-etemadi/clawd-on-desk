<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .bounce { animation: bounce 0.7s cubic-bezier(.34,1.56,.64,1) infinite; transform-origin: 7.5px 17px; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2.2px); } }
    .arm-l { animation: armup .7s cubic-bezier(.34,1.56,.64,1) infinite; transform-origin: 1.5px 11px; }
    .arm-r { animation: armup .7s cubic-bezier(.34,1.56,.64,1) infinite; transform-origin: 13.5px 11px; }
    @keyframes armup { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(10deg); } }
    .confetti { animation: fall 1.4s linear infinite; }
    .c1{animation-delay:0s} .c2{animation-delay:.3s} .c3{animation-delay:.6s} .c4{animation-delay:.9s} .c5{animation-delay:.2s}
    @keyframes fall { 0% { transform: translateY(-2px) rotate(0deg); opacity: 1; } 100% { transform: translateY(10px) rotate(180deg); opacity: 0; } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="8.5" ry="1.5" fill="rgba(0,0,0,0.15)"/>

  <g class="bounce">
    <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>

    <path class="arm-l" d="M 1.5 11 Q -2.5 8 -1.8 3" stroke="#f3d9a8" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <circle class="arm-l" cx="-1.9" cy="2.7" r="1.5" fill="#f3d9a8"/>
    <path class="arm-r" d="M 13.5 11 Q 17.5 8 16.8 3" stroke="#f3d9a8" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <circle class="arm-r" cx="16.9" cy="2.7" r="1.5" fill="#f3d9a8"/>

    <polygon points="1,-3.6 3,-9.6 5.6,-4.4" fill="#f3d9a8"/>
    <polygon points="14,-3.6 12,-9.6 9.4,-4.4" fill="#f3d9a8"/>
    <polygon points="2,-4.6 3.2,-8.2 4.6,-5" fill="#f6bfcb"/>
    <polygon points="13,-4.6 11.8,-8.2 10.4,-5" fill="#f6bfcb"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.4" rx="1.6" ry="1.1" fill="#f0a8a8" opacity="0.85"/>
    <ellipse cx="11.7" cy="0.4" rx="1.6" ry="1.1" fill="#f0a8a8" opacity="0.85"/>

    <path d="M 3.4 -1.6 Q 4.9 -0.3 6.4 -1.6" stroke="#3a2a1e" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M 8.6 -1.6 Q 10.1 -0.3 11.6 -1.6" stroke="#3a2a1e" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M 5.5 2.4 Q 7.5 4.6 9.5 2.4" stroke="#7a4a3a" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  </g>

  <rect class="confetti c1" x="-4" y="-13" width="1.6" height="1.6" fill="#e05a5a"/>
  <rect class="confetti c2" x="6" y="-16" width="1.4" height="1.4" fill="#e8b04a"/>
  <rect class="confetti c3" x="16" y="-14" width="1.6" height="1.6" fill="#6fa8dc"/>
  <rect class="confetti c4" x="20" y="-9" width="1.4" height="1.4" fill="#e05a5a"/>
  <rect class="confetti c5" x="10" y="-12" width="1.3" height="1.3" fill="#7fc97f"/>
</svg>
