<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .breathe { animation: breathe 4.2s cubic-bezier(.45,0,.55,1) infinite; transform-origin: 7.5px 17px; }
    @keyframes breathe { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.012); } }
    .lid { animation: blink 5.6s ease-in-out infinite; }
    @keyframes blink { 0%,92%,100% { opacity: 0; } 95%,97% { opacity: 1; } }
    .shadow-pulse { animation: shadowpulse 4.2s cubic-bezier(.45,0,.55,1) infinite; transform-origin: 7.5px 17.5px; }
    @keyframes shadowpulse { 0%,100% { transform: scaleX(1); opacity: 0.16; } 50% { transform: scaleX(0.96); opacity: 0.13; } }
  </style>

  <g id="shadow-js" style="transform-origin:7.5px 17.5px">
    <ellipse class="shadow-pulse" cx="7.5" cy="17.5" rx="8.5" ry="1.8" fill="#000"/>
  </g>

  <g id="body-js">
    <g class="breathe">
      <path d="M 14.8 14 Q 20 11 18 6" stroke="#f3d9a8" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
      <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>
      <ellipse cx="3.6" cy="16.6" rx="1.8" ry="1.3" fill="#f3d9a8"/>
      <ellipse cx="11.4" cy="16.6" rx="1.8" ry="1.3" fill="#f3d9a8"/>

      <polygon points="1,-3.6 3,-9.6 5.6,-4.4" fill="#f3d9a8"/>
      <polygon points="14,-3.6 12,-9.6 9.4,-4.4" fill="#f3d9a8"/>
      <polygon points="2,-4.6 3.2,-8.2 4.6,-5" fill="#f6bfcb"/>
      <polygon points="13,-4.6 11.8,-8.2 10.4,-5" fill="#f6bfcb"/>

      <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
      <ellipse cx="3.3" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>
      <ellipse cx="11.7" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>

      <path d="M 1.2 0.6 L -2 0" stroke="#c9ab77" stroke-width="0.4"/>
      <path d="M 1.2 1.6 L -2 1.8" stroke="#c9ab77" stroke-width="0.4"/>
      <path d="M 13.8 0.6 L 17 0" stroke="#c9ab77" stroke-width="0.4"/>
      <path d="M 13.8 1.6 L 17 1.8" stroke="#c9ab77" stroke-width="0.4"/>

      <polygon points="6.7,0.6 8.3,0.6 7.5,1.6" fill="#e88a9a"/>
      <path d="M 6.3 2.5 Q 7.5 3.4 8.7 2.5" stroke="#7a4a3a" stroke-width="0.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <g id="eyes-js">
    <circle cx="4.9" cy="-1.4" r="2.3" fill="#3a2a1e"/>
    <circle cx="10.1" cy="-1.4" r="2.3" fill="#3a2a1e"/>
    <circle cx="4.3" cy="-2.1" r="0.6" fill="#fff"/>
    <circle cx="10.7" cy="-2.1" r="0.6" fill="#fff"/>
    <rect class="lid" x="2.5" y="-3.6" width="4.6" height="3" fill="#f3d9a8"/>
    <rect class="lid" x="7.7" y="-3.6" width="4.6" height="3" fill="#f3d9a8"/>
  </g>
</svg>
