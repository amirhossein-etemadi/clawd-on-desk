<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <style>
    .waddle { animation: waddle 0.5s cubic-bezier(.45,0,.55,1) infinite; transform-origin: 7.5px 17px; }
    @keyframes waddle { 0%,100% { transform: rotate(-4deg) translateY(0); } 50% { transform: rotate(4deg) translateY(-1.4px); } }
    .paw-l { animation: stepl 0.5s ease-in-out infinite; transform-origin: 3.6px 16.6px; }
    .paw-r { animation: stepr 0.5s ease-in-out infinite; transform-origin: 11.4px 16.6px; }
    @keyframes stepl { 0%,100% { transform: translateY(0) scaleY(1); } 50% { transform: translateY(-1.6px) scaleY(0.8); } }
    @keyframes stepr { 0%,100% { transform: translateY(-1.6px) scaleY(0.8); } 50% { transform: translateY(0) scaleY(1); } }
    .tail { animation: tailswing 0.5s ease-in-out infinite; transform-origin: 14.8px 14px; }
    @keyframes tailswing { 0%,100% { transform: rotate(10deg); } 50% { transform: rotate(-8deg); } }
    .lid { animation: blink 3.2s ease-in-out infinite; }
    @keyframes blink { 0%,90%,100% { opacity: 0; } 94%,97% { opacity: 1; } }
  </style>

  <ellipse cx="7.5" cy="17.5" rx="8" ry="1.6" fill="rgba(0,0,0,0.15)"/>

  <g class="waddle">
    <path class="tail" d="M 14.8 14 Q 20 12 18.5 7" stroke="#f3d9a8" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <rect x="0" y="3" width="15" height="14.5" rx="6.5" fill="#f3d9a8"/>
    <ellipse cx="7.5" cy="12" rx="4.2" ry="4.8" fill="#fbeed2" opacity="0.7"/>
    <ellipse class="paw-l" cx="3.6" cy="16.6" rx="1.8" ry="1.3" fill="#f3d9a8"/>
    <ellipse class="paw-r" cx="11.4" cy="16.6" rx="1.8" ry="1.3" fill="#f3d9a8"/>

    <polygon points="1,-3.6 3,-9.6 5.6,-4.4" fill="#f3d9a8"/>
    <polygon points="14,-3.6 12,-9.6 9.4,-4.4" fill="#f3d9a8"/>
    <polygon points="2,-4.6 3.2,-8.2 4.6,-5" fill="#f6bfcb"/>
    <polygon points="13,-4.6 11.8,-8.2 10.4,-5" fill="#f6bfcb"/>
    <circle cx="7.5" cy="-1" r="6.8" fill="#f3d9a8"/>
    <ellipse cx="3.3" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>
    <ellipse cx="11.7" cy="0.6" rx="1.3" ry="0.9" fill="#f6bfcb" opacity="0.7"/>

    <circle cx="4.9" cy="-1.4" r="2.3" fill="#3a2a1e"/>
    <circle cx="10.1" cy="-1.4" r="2.3" fill="#3a2a1e"/>
    <circle cx="4.3" cy="-2.1" r="0.6" fill="#fff"/>
    <circle cx="10.7" cy="-2.1" r="0.6" fill="#fff"/>
    <rect class="lid" x="2.5" y="-3.6" width="4.6" height="3" fill="#f3d9a8"/>
    <rect class="lid" x="7.7" y="-3.6" width="4.6" height="3" fill="#f3d9a8"/>
    <path d="M 6.3 2.5 Q 7.5 3.4 8.7 2.5" stroke="#7a4a3a" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
